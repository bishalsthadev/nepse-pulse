<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEPSE Pulse — Stock Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">📈 NEPSE Pulse</div>
      <div class="header-right">
        <span id="market-badge" class="badge badge-closed">Market Closed</span>
        <span id="last-updated" class="muted">Loading…</span>
        <button id="notif-btn" class="btn-ghost" onclick="requestNotifPermission()">
          🔔 Enable Alerts
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- PORTFOLIO SUMMARY -->
    <section class="section">
      <h2 class="section-title">Your Portfolio</h2>
      <div id="portfolio-cards" class="cards-grid">
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
      </div>
    </section>

    <!-- WATCHLIST -->
    <section class="section">
      <h2 class="section-title">Watchlist</h2>
      <div id="watchlist" class="table-wrap">
        <p class="muted">Loading prices…</p>
      </div>
    </section>

    <!-- ALERT FEED -->
    <section class="section">
      <h2 class="section-title">Recent Alerts</h2>
      <div id="alert-feed">
        <p class="muted">No alerts yet.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Data from NEPSE public sources · Refreshes every 60 s · Not financial advice</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
